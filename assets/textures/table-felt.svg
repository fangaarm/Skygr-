<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600">
  <defs>
    <linearGradient id="felt" x1="0%" x2="100%" y1="0%" y2="100%">
      <stop offset="0%" stop-color="#173b71"/>
      <stop offset="45%" stop-color="#0f234f"/>
      <stop offset="100%" stop-color="#09152e"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="40%" r="58%">
      <stop offset="0%" stop-color="#29d4ff" stop-opacity=".18"/>
      <stop offset="100%" stop-color="#29d4ff" stop-opacity="0"/>
    </radialGradient>
    <pattern id="dots" width="18" height="18" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#ffffff" fill-opacity=".05"/>
      <circle cx="11" cy="9" r=".8" fill="#ffffff" fill-opacity=".03"/>
      <circle cx="15" cy="14" r="1.1" fill="#ffffff" fill-opacity=".04"/>
    </pattern>
  </defs>
  <rect width="900" height="600" fill="url(#felt)"/>
  <rect width="900" height="600" fill="url(#dots)"/>
  <rect width="900" height="600" fill="url(#glow)"/>
</svg>
